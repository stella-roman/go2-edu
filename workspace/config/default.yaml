# agent-stella VLM 모듈 설정 파일
# YAML 내부에서 ${ENV:VAR_NAME} 형태로 환경 변수 참조 가능
# 우선순위: CLI args > YAML > ENV

app:
  output_root: "output"  # output/YYYYMMDD_HHMMSS/ 생성

# 카메라 설정 (OAK-D)
camera:
  rgb:
    preview_size: [640, 360]  # VLM에 전송할 프레임 크기 (16:9 권장)
    sensor_resolution: "THE_1080_P"  # DepthAI 센서 해상도
    interleaved: false
    color_order: "BGR"
    fps: 40  # 카메라 입력 FPS (yolo_test_82.py 유지)
  
  depth:
    enabled: true
    confidence_threshold: 240  # 0-255 (높일수록 저신뢰 depth 제거)
    median_filter: "MEDIAN_OFF"
    lr_check: true
    extended_disparity: false
    subpixel: false

# 링 버퍼 설정
ring_buffer:
  max_seconds: 10  # 최대 시간 창
  max_frames: 200  # 최대 프레임 수
  store_format: "jpeg"  # 저장 포맷 (VLM 첨부용)
  jpeg_quality: 85  # JPEG 품질

# Keyframe 감지 설정
keyframes:
  downsample_size: 160  # 장면 변화 계산용 다운샘플 크기 (160×160)
  scene_change_threshold: 0.12  # 장면 변화 임계값
  min_keyframe_interval_sec: 2.0  # Keyframe 최소 간격
  max_pinned_keyframes: 200  # 핀된 keyframe 최대 개수

# 프레임 선택 정책
selection:
  max_images_per_turn: 8  # 한 턴에 보낼 최대 이미지 수
  recent_window_sec: 3  # 최근 프레임 선택 시간 창
  recent_max_images: 4  # 최근 프레임 최대 장수
  keyframe_window_sec: 60  # Keyframe 선택 시간 창
  keyframe_max_images: 4  # Keyframe 최대 장수

# 저장 설정
storage:
  fps: 15  # 저장 영상 FPS
  save_rgb_mp4: true
  save_depth_overlay_mp4: true
  save_depth_mp4: true  # depth 컬러맵 전용 영상 저장 (video/depth.mp4)
  depth_overlay:
    alpha: 0.4  # Depth colormap 블렌딩 알파
    min_mm: 200  # Depth 최소값 (mm)
    max_mm: 10000  # Depth 최대값 (mm)
    colormap: "JET"  # OpenCV colormap 이름

# VLM Provider 설정
vlm:
  provider: "openai"  # gemini 또는 openai
  system_prompt_language: "English"  # System prompt 언어
  system_prompt: |
    You are STELLA, an assistive navigation assistant for a blind user.
    Always respond in short, direct English (1-3 sentences).
    Prioritize safety and actionable spatial instructions.

    Critical rules:
    - You CAN interpret the images provided with the user's request.
    - Do NOT use visual verbs like "look", "see", "watch", "notice". Instead say "The scene contains..." or "In front of you there is...".
    - Avoid vague phrases like "go there" or "over there".
    - Prefer: "Move forward X centimeters", "Turn slightly left/right", "Stop".
    - If you are uncertain, ask ONE concise clarification question.

    Note:
    - Depth-based guidance (stop/near warnings, obstacle/door alerts) may be provided separately.
  scene_prompt: |
    You are a vision assistant for a blind user.
    Describe the current scene from the provided camera images.
    Output short, direct English (2-5 sentences).

    Rules:
    - Do NOT say "I see". Use "The scene contains..." / "In front of you..." phrasing.
    - Mention the most important objects and their approximate positions (left/center/right, near/far) without inventing exact distances.
    - If the images are unclear or missing, say so and ask ONE clarifying question.
  image_source: "rgb"  # "rgb" 또는 "depth_overlay"
  
  gemini:
    base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
    model: "gemini-2.0-flash-exp"
    api_key: "${ENV:GEMINI_API_KEY}"  # .env 파일에서 자동 로드
  
  openai:
    model: "gpt-4o-mini"
    api_key: "${ENV:OPENAI_API_KEY}"  # .env 파일에서 자동 로드
    base_url: ""  # 기본값 사용 (OpenAI 공식 엔드포인트)

# Depth 기반 Find/Guide 내비게이션(실험적)
navigation:
  depth_features:
    # ROI fractions: [x0, x1, y0, y1] in 0..1
    roi:
      left: [0.0, 0.33, 0.2, 0.8]
      center: [0.33, 0.67, 0.2, 0.8]
      right: [0.67, 1.0, 0.2, 0.8]
    statistic: "p10"  # "p10" 또는 "median"
    ema_alpha: 0.7
    min_valid_ratio: 0.01

  find:
    near_warn_cm: 50
    stop_cm: 30

  guide:
    obstacle_threshold_cm: 80
    door_announce_cm: 30
    door_tolerance_cm: 10

  guidance:
    hz: 8.0
    cooldown_sec: 2.0
    required_consecutive: 3
    label_refresh_sec: 1.0
    distance_round_step_cm: 5
    find_guidance_cooldown_sec: 6.0
    # If the labeler briefly loses the target, keep "visible" for this grace window
    # to avoid noisy "Searching..." spam.
    find_visible_grace_sec: 2.5
    # Only say "Searching..." after this many consecutive visible=false results.
    find_search_required_false_streak: 3
    find_moving_away_delta_cm: 15.0
    find_moving_away_window_sec: 2.0
    find_moving_away_cooldown_sec: 6.0

  labeler:
    # Use only ring buffer (recent frames) for low-rate labeling
    recent_window_sec: 1.5
    max_images: 4